# =====================================================================
# SDLC-V2 — Phase 7 Deployment Config
# =====================================================================
# Platform configuration: declares the infrastructure (registries,
# deploy targets, CLIs) that exists in this environment. It does NOT
# enumerate every repo — repos carry their own `.deploy.yaml`.
#
# When Phase 7 gets a list of affected repos:
#   1. URL lookup: legacy `repos:` block (below) first, then `repo_resolver`
#   2. Clone each repo, read its `.deploy.yaml`
#   3. Merge: defaults  ←  .deploy.yaml  ←  legacy `repos:` entry (if any)
#
# `${VAR}` and `${VAR:-default}` are expanded from env at load time.
# =====================================================================

project_name: sdlc-development
workspace_dir: /tmp/sdlc-deploy-workspace

# Set true to log every git/docker/aws/HTTP call without actually running it.
dry_run: false

# Max repos deployed concurrently WITHIN a dependency level. Repos of the same
# type (library/backend/frontend/...) form a level and deploy in parallel;
# levels themselves stay strictly sequential so dependencies are honoured (a
# backend never starts before its libraries finish). Set to 1 to force the old
# fully-sequential behavior. Keep modest to avoid docker/registry/AWS rate
# limits.
deploy_parallelism: 4

# CLIs (docker, aws, git) are now baked into the Docker image (see Dockerfile),
# so runtime auto-install is OFF. If a CLI is somehow missing, Phase 7 should
# fail loudly (pointing to an image-build problem) rather than silently trying
# a runtime install that can half-succeed — e.g. installing the docker client
# but not a working daemon. Set to true only if you run Phase 7 on a bare host
# where installing CLIs at runtime is genuinely appropriate.
cli_auto_install: false

# ---------------------------------------------------------------------
# How to find the git URL for a repo when it's not pre-declared below.
# This is what makes the system scale: new repos just need a name and a
# `.deploy.yaml` in their root — no central config change required.
# ---------------------------------------------------------------------
repo_resolver:
  url_template: "https://github.com/{org}/{name}.git"
  # Org/owner for cloning repos to deploy. Defaults to the SDLC-V2-Team org.
  # Set GITHUB_REPO_OWNER in .env to your org (or personal account) to override.
  org: ${GITHUB_REPO_OWNER:-SDLC-V2-Team}

# ---------------------------------------------------------------------
# Platform defaults applied to every repo (unless overridden by the
# repo's own .deploy.yaml or a legacy `repos:` entry).
# ---------------------------------------------------------------------
defaults:
  branch: main
  dockerfile: Dockerfile
  docker_context: .
  registry: ecr-prod                      # default registry name
  deploy_target: ecs-prod-alb             # default deploy target name
  # (ALB-enabled → returns a stable URL)
  image_tag: ${BUILD_TAG:-latest}
  deploy_contract_path: .deploy.yaml      # where to look in each repo

# ---------------------------------------------------------------------
# CLIs that must be on PATH. Missing CLIs with an install_command are
# auto-installed when cli_auto_install: true.
# ---------------------------------------------------------------------
required_clis:
  - name: git
    version_command: git --version
    install_hint: "apt-get install -y git  /  brew install git"
    install_command: "apt-get update && apt-get install -y git"

  - name: docker
    version_command: docker --version
    install_hint: "https://docs.docker.com/get-docker/"
    install_command: "curl -fsSL https://get.docker.com | sh"

  - name: aws
    version_command: aws --version
    install_hint: "https://docs.aws.amazon.com/cli/latest/userguide/getting-started-install.html"
    install_command: "pip install --break-system-packages awscli"

  - name: kubectl
    version_command: kubectl version --client=true -o json
    install_hint: "https://kubernetes.io/docs/tasks/tools/"
    required: false   # only needed if a repo targets kubernetes

# ---------------------------------------------------------------------
# Container registries available in this environment. Repos reference
# these by name from their `.deploy.yaml` (or use the default above).
# ---------------------------------------------------------------------
registries:
  - name: ecr-prod
    kind: ecr
    region: ${AWS_REGION:-us-east-1}
    account_id: ${AWS_ACCOUNT_ID}
    create_repository_if_missing: true

  - name: dockerhub
    kind: dockerhub
    username: ${DOCKERHUB_USERNAME}
    password: ${DOCKERHUB_TOKEN}

  - name: ghcr
    kind: ghcr
    username: ${GITHUB_REPO_OWNER}
    password: ${GITHUB_TOKEN}

# ---------------------------------------------------------------------
# Deploy targets — the environments code can be deployed to. Repos pick
# one by name from their `.deploy.yaml` (e.g. `deploy.target: ecs-prod`).
#
# AWS credentials come from env vars (or from an IAM instance role on
# the deploy host, in which case the keys can be empty).
# ---------------------------------------------------------------------
deploy_targets:
  # ---- AWS ECS ------------------------------------------------------
  - name: ecs-prod
    kind: ecs
    config:
      access_key_id: ${AWS_ACCESS_KEY_ID}
      secret_access_key: ${AWS_SECRET_ACCESS_KEY}
      region: ${AWS_REGION:-us-east-1}
      cluster: sdlc-development-cluster
      # service is omitted here — repos provide their own via .deploy.yaml
      wait_for_stable: true

  # ---- AWS ECS behind an Application Load Balancer (stable URL) ------
  # Use this target (or set enable_alb: true on any ecs target / in a repo's
  # .deploy.yaml `deploy:` block) to get a stable, demoable HTTPS-ready URL.
  #
  # Smart detection (no naming convention needed):
  #   * service absent            -> creates ALB + target group + listener,
  #                                  then creates the service wired to it.
  #   * service already has an LB -> reuses it (detected from the service's
  #                                  own loadBalancers[], any ALB name), just
  #                                  rolls the new image.
  #   * service exists, no LB      -> updates image only (AWS forbids attaching
  #                                  an ALB to an existing service; needs a
  #                                  one-time recreate to add one).
  #
  # The deployed app's URL is returned as `endpoint` in the deploy result and
  # collected into state as `deploy_endpoints`.
  - name: ecs-prod-alb
    kind: ecs
    config:
      access_key_id: ${AWS_ACCESS_KEY_ID}
      secret_access_key: ${AWS_SECRET_ACCESS_KEY}
      region: ${AWS_REGION:-us-east-1}
      cluster: sdlc-development-cluster
      wait_for_stable: true
      enable_alb: true                 # turn on ALB provisioning/detection
      container_port: 8000             # the port your app listens on
      health_check_path: /health       # ALB health check path (must return 200)
      # cpu/memory default to 256/512; override per-repo in .deploy.yaml
      #
      # --- Bring-up latency tuning (fast-demo defaults) ----------------------
      # These reduce the time from "deploy done" to "URL serving" from the AWS
      # default of ~150s to ~20s, WITHOUT skipping the health check. A fresh
      # target serves traffic after hc_healthy_threshold × hc_interval_seconds.
      # NOTE: the real floor is your app's own startup time — if the app needs
      # 20s to answer /health, no tuning beats that. For an instant demo, also
      # PRE-WARM: deploy before the audience is watching; once healthy the URL
      # responds immediately, and redeploys stay warm (rolling config keeps a
      # healthy task up before draining the old one).
      hc_interval_seconds: 10          # how often the ALB probes (min sane ~10)
      hc_healthy_threshold: 2          # consecutive passes before routing
      hc_timeout_seconds: 5            # per-probe timeout
      deregistration_delay_seconds: 30 # drain time on redeploy (AWS dflt 300)
      health_poll_interval_seconds: 3  # how often WE check health (observation)

  - name: ecs-staging
    kind: ecs
    config:
      access_key_id: ${AWS_ACCESS_KEY_ID}
      secret_access_key: ${AWS_SECRET_ACCESS_KEY}
      region: ${AWS_REGION:-us-east-1}
      cluster: leave-mgmt-staging
      wait_for_stable: true

  # ---- AWS Lambda ---------------------------------------------------
  - name: lambda-prod
    kind: lambda
    config:
      access_key_id: ${AWS_ACCESS_KEY_ID}
      secret_access_key: ${AWS_SECRET_ACCESS_KEY}
      region: ${AWS_REGION:-us-east-1}
      wait_for_updated: true
      # function_name comes from each repo's .deploy.yaml

  # ---- Docker Compose ----------------------------------------------
  - name: compose-prod
    kind: compose
    config:
      compose_file: docker-compose.yml

  # ---- Plain Kubernetes ---------------------------------------------
  - name: k8s-prod
    kind: kubernetes
    config:
      namespace: production

  # ---- Webhook ------------------------------------------------------
  - name: webhook-prod
    kind: webhook
    config:
      url: ${N8N_DEPLOY_WEBHOOK_URL}
      headers:
        Content-Type: application/json
        Authorization: "Bearer ${N8N_WEBHOOK_TOKEN}"
      payload:
        image: "{image}"
        repo: "{repo}"
        tag: "{tag}"
        commit: "{commit}"

  # ---- Dry run ------------------------------------------------------
  - name: dry-run-only
    kind: dry-run
    config: {}

# ---------------------------------------------------------------------
# LEGACY: pre-declared repos. The new pattern is `.deploy.yaml` in each
# repo's root, but you can still list repos here as an escape hatch for
# repos that haven't migrated, or to override their contract centrally.
#
# Anything declared here WINS over the repo's own .deploy.yaml.
# Leave the block empty for a fully-decentralized setup.
# ---------------------------------------------------------------------
repos: []

# ---------------------------------------------------------------------
# Classification rules used when a repo doesn't declare its `type` in
# `.deploy.yaml`. First substring match wins.
# ---------------------------------------------------------------------
classification:
  library:  [lib, common, shared, sdk]
  backend:  [backend, api, service, server]
  frontend: [frontend, ui, web, client]
  batch:    [batch, job, worker, cron]
  order:    [library, backend, frontend, batch, service]

# ---------------------------------------------------------------------
# Post-deploy monitoring. Set metrics_endpoint to your Prometheus /
# Datadog / health-check URL for real metrics; otherwise uses defaults.
# ---------------------------------------------------------------------
monitoring:
  enabled: true
  metrics_endpoint: ""
  max_error_rate: 0.05
  max_latency_ms: 500
  check_duration_seconds: 60
  auto_rollback_on_breach: true

default_feature_flags:
  - flag_name: new_feature_enabled
    default: false
    enable_after_deploy: true

default_rollback_steps:
  - "Revert to previous deployment image tag"
  - "Disable any feature flags enabled in this rollout"
  - "Alert on-call channel"
