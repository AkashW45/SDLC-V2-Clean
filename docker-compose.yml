services:

  qdrant:
    image: qdrant/qdrant:latest
    container_name: sdlc_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  neo4j:
    image: neo4j:5.18
    container_name: sdlc_neo4j
    hostname: sdlc_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_default__listen__address=0.0.0.0 
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: sdlc_postgres
    ports:
      - "5437:5432"
    environment:
      - POSTGRES_USER=sdlc
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=sdlc_knowledge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped


  sdlc_api:
    build: .
    container_name: sdlc_api
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: sdlc_postgres
      POSTGRES_PORT: 5437
      QDRANT_HOST: sdlc_qdrant
      QDRANT_PORT: 6333
      NEO4J_URI: bolt://sdlc_neo4j:7687
    depends_on:
      - postgres
      - qdrant
      - neo4j
    volumes:
      - ./repos:/repos
    restart: unless-stopped  

volumes:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  postgres_data: